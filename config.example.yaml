# Kenko NVR bootstrap configuration.
#
# Only the few settings needed before the database is available live here.
# Everything else — the web login account, cameras, recording/retention, S3,
# notifications, live transcoding, and the RTMP / RTSP / RTSP-server / WebRTC /
# GB28181 network services — is configured at runtime in the web UI and stored
# in SQLite.
#
# The web login defaults to admin / admin; change it under Users (the UI warns
# until you do).

http:
  addr: ":8080"        # management UI + REST API + HLS live view
  jwt_secret: ""       # signs session tokens; empty = random per start (sessions
                       # do not survive a restart). Set a fixed value to persist.

storage:
  recordings_dir: ./data/recordings
  db_path: ./data/nvr.db

log:
  level: info          # debug | info | warn | error
